# OpShield Development Services
#
# NOTE: These services are shared with SafeSpec and Nexum.
# They are already running on the dev server. Do NOT spin up duplicates.
# This file is for REFERENCE ONLY — it documents the shared services.
#
# OpShield uses:
#   - PostgreSQL: database "opshield_dev" (SafeSpec uses "safespec_dev", Nexum uses "nexum_dev")
#   - Redis: key prefix "opshield:" (SafeSpec uses "safespec:", Nexum uses "nexum:")
#   - MinIO: bucket "opshield-dev" (SafeSpec uses "safespec-dev", Nexum uses "nexum-dev")
#   - MailHog: shared (no separation needed)

services:
